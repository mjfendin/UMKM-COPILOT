{% extends "base.html" %}
{% block title %}{{ 'Edit' if mode=='edit' else 'Tambah' }} Produk{% endblock %}
{% block page_title %}{{ 'Edit' if mode=='edit' else 'Tambah' }} Produk{% endblock %}

{% block content %}
<div style="max-width:600px;">
<div class="card">
    <div class="card-head"><i class="bi bi-box-seam"></i> Informasi Produk</div>
    <div class="card-body">
        <form method="POST">
            <div style="display:grid;gap:12px;">
                <div>
                    <label class="lbl">Nama Produk *</label>
                    <input class="input" name="name" value="{{ product.name if product else '' }}" required>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div>
                        <label class="lbl">Kategori</label>
                        <select class="input" name="category">
                            {% for c in ['Umum','Pakaian Pria','Pakaian Wanita','Celana','Sepatu','Aksesoris','Makanan'] %}
                            <option value="{{ c }}" {% if product and product.category==c %}selected{% endif %}>{{ c }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="lbl">Stok *</label>
                        <input class="input" type="number" name="stock" value="{{ product.stock if product else 0 }}" min="0" required>
                    </div>
                </div>
                <div>
                    <label class="lbl">Deskripsi</label>
                    <textarea class="input" name="description" rows="3" style="resize:vertical;">{{ product.description if product else '' }}</textarea>
                </div>
                <div>
                    <label class="lbl">Harga (Rp) *</label>
                    <input class="input" type="number" name="price" value="{{ product.price|int if product else '' }}" min="0" required>
                </div>
                <div style="display:flex;gap:8px;padding-top:8px;">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check"></i> Simpan</button>
                    <a href="{{ url_for('products_list') }}" class="btn btn-ghost">Batal</a>
                </div>
            </div>
        </form>
    </div>
</div>
</div>
{% endblock %}
