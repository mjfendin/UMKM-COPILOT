{% extends "base.html" %}
{% block title %}Pengaturan{% endblock %}
{% block page_title %}Pengaturan{% endblock %}

{% block content %}
<div style="max-width:600px;">
<div class="card">
    <div class="card-head"><i class="bi bi-shop"></i> Informasi Toko</div>
    <div class="card-body">
        <form method="POST">
            <div style="display:grid;gap:12px;">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div>
                        <label class="lbl">Nama Toko *</label>
                        <input class="input" name="name" value="{{ shop.name }}" required>
                    </div>
                    <div>
                        <label class="lbl">Pemilik</label>
                        <input class="input" name="owner_name" value="{{ shop.owner_name }}">
                    </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div>
                        <label class="lbl">Telepon</label>
                        <input class="input" name="phone" value="{{ shop.phone }}" placeholder="08xxxxxxxxxx">
                    </div>
                    <div>
                        <label class="lbl">Kategori</label>
                        <select class="input" name="category">
                            {% for c in ['Retail','Retail Fashion','F&B','Jasa','Elektronik','Kecantikan','Lainnya'] %}
                            <option value="{{ c }}" {% if shop.category==c %}selected{% endif %}>{{ c }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div>
                    <label class="lbl">Alamat</label>
                    <textarea class="input" name="address" rows="2">{{ shop.address }}</textarea>
                </div>
            </div>

            <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--c-border);">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
                    <i class="bi bi-whatsapp" style="color:#25D366;font-size:1.1rem;"></i>
                    <span style="font-weight:600;font-size:.88rem;">WhatsApp</span>
                </div>
                <div style="display:grid;grid-template-columns:1fr auto;gap:12px;align-items:end;">
                    <div>
                        <label class="lbl">Nomor WhatsApp Business</label>
                        <input class="input" name="whatsapp_number" value="{{ shop.whatsapp_number }}" placeholder="628xxxxxxxxxx">
                    </div>
                    <div>
                        <label class="lbl">AI Status</label>
                        <div style="display:flex;align-items:center;gap:8px;height:36px;">
                            <input type="checkbox" name="ai_enabled" id="aiEnabled" {% if shop.ai_enabled %}checked{% endif %} style="width:36px;height:20px;">
                            <span id="aiLabel" style="font-size:.78rem;color:var(--c-text-2);">{{ 'Aktif' if shop.ai_enabled else 'Nonaktif' }}</span>
                        </div>
                    </div>
                </div>
            </div>

            <div style="margin-top:16px;">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check"></i> Simpan</button>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-head"><i class="bi bi-link-45deg"></i> Webhook</div>
    <div class="card-body">
        <label class="lbl">Webhook URL</label>
        <div style="display:flex;gap:8px;">
            <input class="input" value="{{ request.host_url }}webhook" readonly id="whUrl">
            <button class="btn btn-ghost btn-sm" onclick="navigator.clipboard.writeText(document.getElementById('whUrl').value);this.textContent='✓ Copied'"><i class="bi bi-clipboard"></i></button>
        </div>
        <div style="margin-top:12px;font-size:.72rem;color:var(--c-text-3);">
            Verify Token: <code style="background:var(--c-bg);padding:2px 4px;border-radius:3px;">umkm-copilot-verify</code>
        </div>
    </div>
</div>
</div>

<script>
document.getElementById('aiEnabled').addEventListener('change', function() {
    document.getElementById('aiLabel').textContent = this.checked ? 'Aktif' : 'Nonaktif';
});
</script>
{% endblock %}
